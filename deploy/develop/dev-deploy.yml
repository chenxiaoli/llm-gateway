services:
  gateway:
    image: ghcr.io/${IMAGE_NAME:-chenxiaoli/llm-gateway}:develop
    restart: unless-stopped
    ports:
      - "3080:8080"
    volumes:
      - /opt/dev/llm-gateway/config.toml:/app/config.toml:ro
      - /opt/dev/llm-gateway/data:/app/data

# Ship this file to dev server and run: docker compose -f dev-deploy.yml up -d
