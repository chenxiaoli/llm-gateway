version: '3'
services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llm_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-llm_gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/18/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llm_gateway} -d ${POSTGRES_DB:-llm_gateway}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  gateway:
    image: ghcr.io/${IMAGE_NAME:-chenxiaoli/llm-gateway}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - ./config.toml:/app/config.toml:ro
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
