# LLM Gateway Production Configuration
# Copy this to config.toml and fill in your secrets.

[server]
host = "0.0.0.0"
port = 8080
# IMPORTANT: Change to a random secret (any length, hashed to 32 bytes)
encryption_key = "change-me-to-a-random-secret"

[auth]
jwt_secret = "change-me-to-a-random-secret"
allow_registration = false

[database]
driver = "postgres"
url = "postgres://llm_gateway:change-me-to-a-strong-password@postgres:5432/llm_gateway"

[rate_limit]
flush_interval_secs = 30
window_size_secs = 60

[upstream]
timeout_secs = 30

[audit]
retention_days = 90
