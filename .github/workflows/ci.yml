name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Build
        run: cd web && npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: llm-gateway-frontend
          path: web/dist/

  backend-test:
    needs: frontend-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: llm-gateway-frontend
          path: web/dist

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  build-release:
    needs: backend-test
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: llm-gateway-linux-x86_64
            binary: llm-gateway
            archive: llm-gateway-linux-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: llm-gateway-macos-arm64
            binary: llm-gateway
            archive: llm-gateway-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: llm-gateway-windows-x86_64
            binary: llm-gateway.exe
            archive: llm-gateway-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: llm-gateway-frontend
          path: web/dist

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary with platform suffix
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.archive }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.archive }}

  release:
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: llm-gateway-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: Release ${{ github.ref_name }}
          body: |
            ## llm-gateway ${{ github.ref_name }}

            ### Assets
            | File | Platform |
            |------|----------|
            | `llm-gateway-linux-x86_64` | Linux x86_64 |
            | `llm-gateway-macos-arm64` | macOS ARM64 (Apple Silicon) |
            | `llm-gateway-windows-x86_64.exe` | Windows x86_64 |

            Web dashboard is embedded in the binary. Access it at `http://localhost:8080/` after starting.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
