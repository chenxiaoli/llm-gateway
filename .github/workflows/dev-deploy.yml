name: Dev Deploy

on:
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/llm-gateway

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: cd web && npm ci

      - name: Frontend tests
        run: cd web && npm test

      - name: Build frontend
        run: cd web && npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Backend tests
        run: cargo test --workspace

  build-image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=develop
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VITE_COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-image
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Deploy to dev host
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop

            docker stop llm-gateway-dev 2>/dev/null || true
            docker rm llm-gateway-dev 2>/dev/null || true

            docker run -d \
              --name llm-gateway-dev \
              --restart unless-stopped \
              -p 3080:8080 \
              -v /opt/dev/llm-gateway/config.toml:/app/config.toml:ro \
              -v /opt/dev/llm-gateway/data:/app/data \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop

            sleep 3

            STATUS=$(docker inspect --format='{{.State.Status}}' llm-gateway-dev 2>/dev/null)
            if [ "$STATUS" != "running" ]; then
              echo "ERROR: container is '$STATUS', expected 'running'"
              docker logs llm-gateway-dev 2>&1 | tail -30
              exit 1
            fi

            echo "OK: llm-gateway-dev is running"
            docker logs llm-gateway-dev 2>&1 | tail -5

            docker image prune -f
