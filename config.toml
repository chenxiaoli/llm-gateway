[server]
host = "0.0.0.0"
port = 8080
encryption_key = "your-32-byte-key-here-placeholder"

[auth]
jwt_secret = "change-me-in-production"
allow_registration = true

[database]
driver = "postgres"
url = "postgresql://llm_gateway:${POSTGRES_PASSWORD}@10.0.17.11/llm_gateway"

[rate_limit]
flush_interval_secs = 30
window_size_secs = 60

[upstream]
timeout_secs = 30

[audit]
retention_days = 90
